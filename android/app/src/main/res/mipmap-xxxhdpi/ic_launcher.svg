<svg width="192" height="192" viewBox="0 0 192 192" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="skyGradient" cx="50%" cy="30%" r="80%">
      <stop offset="0%" style="stop-color:#2C3E50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A252F;stop-opacity:1" />
    </radialGradient>
    <radialGradient id="moonGradient" cx="30%" cy="30%" r="70%">
      <stop offset="0%" style="stop-color:#F8F8FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E6E6FA;stop-opacity:1" />
    </radialGradient>
  </defs>
  
  <!-- Rounded background -->
  <rect width="192" height="192" rx="24" ry="24" fill="url(#skyGradient)"/>
  
  <!-- Moon -->
  <circle cx="96" cy="59.0" r="27" fill="url(#moonGradient)" stroke="#D3D3D3" stroke-width="1"/>
  <circle cx="87.0" cy="54.0" r="3" fill="#C0C0C0" opacity="0.6"/>
  <circle cx="101.0" cy="61.0" r="2" fill="#C0C0C0" opacity="0.5"/>
  <circle cx="91.0" cy="66.0" r="2" fill="#C0C0C0" opacity="0.4"/>
  
  <!-- Ground -->
  <path d="M 0 140.16 Q 48.0 120.0 96.0 124.80000000000001 Q 144.0 129.984 192 140.16 L 192 192 L 0 192 Z" fill="#1A1A1A"/>
  
  <!-- Motorcycle and rider -->
  <g transform="translate(96,132.48) scale(1.2)">
    <!-- Motorcycle body -->
    <ellipse cx="0" cy="8" rx="12" ry="4" fill="#2C3E50"/>
    
    <!-- Wheels -->
    <circle cx="-10" cy="12" r="6" fill="#34495E" stroke="#4A6741" stroke-width="1"/>
    <circle cx="10" cy="12" r="6" fill="#34495E" stroke="#4A6741" stroke-width="1"/>
    
    <!-- Rider -->
    <ellipse cx="-2" cy="0" rx="3" ry="6" fill="#E74C3C"/>
    <circle cx="-2" cy="-4" r="2.5" fill="#F39C12"/>
    
    <!-- Rider arm reaching for moon -->
    <path d="M -4 -2 Q -8 -12 -6 -20" stroke="#E74C3C" stroke-width="2" fill="none" stroke-linecap="round"/>
    <circle cx="-6" cy="-20" r="1.5" fill="#F39C12"/>
    
    <!-- Handlebar -->
    <line x1="-8" y1="2" x2="2" y2="2" stroke="#4A6741" stroke-width="1.5"/>
  </g>
  
  <!-- App name for larger icons -->
  <text x="96" y="174.72" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF">MOTOUBER</text>
</svg>