
workflows:
  android-workflow:
    name: Android APK Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      flutter: "3.24.0"
      xcode: latest
      cocoapods: default
      java: 17
      vars:
        FLUTTER_EMBEDDING_VERSION: "2"
        ANDROID_COMPILE_SDK: "34"
        ANDROID_MIN_SDK: "21"
        ANDROID_TARGET_SDK: "34"
    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: 'main'
          include: true
        - pattern: 'develop'
          include: true
        - pattern: 'feature/*'
          include: false
    scripts:
      - name: Get Flutter packages
        script: |
          flutter pub get

      - name: Flutter analyze
        script: |
          flutter analyze
      - name: Flutter test
        script: |
          flutter test
      - name: Clean and build
        script: |
          flutter clean
          flutter pub get
          # Ensure gradlew has execute permissions
          chmod +x android/gradlew
          # Complete cache cleanup for resource issues
          cd android && ./gradlew clean
          cd android && ./gradlew cleanBuildCache || true
          # Remove any potential conflicting resources
          find . -name "*.svg" -path "*/res/mipmap-*" -delete || true
      - name: Build release APK
        script: |
          flutter build apk --release --verbose \
            --build-name=1.0.$BUILD_NUMBER \
            --build-number=$BUILD_NUMBER
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk
      - build/app/outputs/**/*.apk
      - build/app/outputs/**/mapping.txt
      - build/app/outputs/**/*.aab
      - flutter_drive.log
    publishing:
      email:
        recipients:
          - santanajesse155@gmail.com
        notify:
          success: true
          failure: true
