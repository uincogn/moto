
workflows:
  android-workflow:
    name: Android APK Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      java: 17
      vars:
        FLUTTER_EMBEDDING_VERSION: "2"
        ANDROID_COMPILE_SDK: "34"
        ANDROID_MIN_SDK: "21"
        ANDROID_TARGET_SDK: "34"
    triggering:
      events:
        - push
        - pull_request
      branch_patterns:
        - pattern: 'main'
          include: true
        - pattern: 'develop'
          include: true
        - pattern: 'feature/*'
          include: false
    scripts:
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Create assets directories
        script: |
          mkdir -p assets/images
          mkdir -p assets/icons
      - name: Flutter analyze
        script: |
          flutter analyze
      - name: Flutter test
        script: |
          flutter test
      - name: Clean and build
        script: |
          flutter clean
          flutter pub get
      - name: Build release APK
        script: |
          flutter build apk --release --verbose
    artifacts:
      - build/app/outputs/**/*.apk
      - build/app/outputs/**/mapping.txt
      - build/app/outputs/**/bundle.aab
      - flutter_drive.log
    publishing:
      email:
        recipients:
          - santanajesse155@gmail.com
        notify:
          success: true
          failure: true
